<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="时空任务编排器：面向窗口捕获、画面检测和步骤编排的本地控制台"
    />
    <title>时空任务编排器</title>
  </head>
  <body>
    <a class="skip-link" href="#workspace">跳到工作区</a>
    <main id="app">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">ShiKong Control</p>
          <h1>时空任务编排器</h1>
          <p id="status">Ready</p>
        </div>
        <div class="toolbar" aria-label="窗口操作">
          <button id="refresh-windows" type="button">刷新窗口</button>
          <button id="launch-game-client" type="button">启动客户端</button>
          <button id="select-game-windows" type="button">选择全部</button>
          <button id="restart-admin" type="button">管理员重启</button>
          <span id="launch-status" class="meta"></span>
        </div>
      </header>

      <section id="workspace" class="app-shell">
        <aside class="target-rail" aria-label="目标窗口">
          <section class="panel target-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Targets</p>
                <h2>目标窗口</h2>
              </div>
              <span id="window-count" class="count">0</span>
            </div>
            <div id="window-list" class="window-list"></div>
          </section>

          <section class="panel capture-panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Capture</p>
                <h2>采样</h2>
              </div>
              <span id="privilege-state" class="state-pill">权限未知</span>
            </div>
            <div class="capture-actions">
              <button id="focus-window" type="button">置前查看</button>
              <button id="capture-preview" type="button">刷新预览</button>
              <button id="save-snapshot" type="button">保存截图</button>
              <input id="offline-image-path" type="text" placeholder="离线截图路径" />
              <button id="load-offline-image" type="button">载入离线图</button>
            </div>
          </section>
        </aside>

        <section class="workbench">
          <section class="preview-panel panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Preview</p>
                <h2>画面预览</h2>
              </div>
              <span id="active-window-meta" class="meta">未选择窗口</span>
            </div>
            <div class="preview-stage">
              <img id="preview-image" alt="当前目标窗口预览" />
              <div id="roi-box"></div>
              <div id="preview-empty" class="empty">暂无预览</div>
            </div>
            <div class="preview-footer">
              <span id="roi-meta" class="meta">ROI: none</span>
              <span class="meta">后台输入路径保留，当前仅编排定义</span>
            </div>
          </section>

          <section class="workflow-panel panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Definition</p>
                <h2>任务定义</h2>
              </div>
              <span id="task-model-state" class="state-pill">draft</span>
            </div>
            <div class="form-grid">
              <label>
                名称
                <input id="flow-name" type="text" />
              </label>
              <label>
                恢复策略
                <select id="restore-policy">
                  <option value="none">none</option>
                  <option value="restore">restore</option>
                  <option value="restart">restart</option>
                </select>
              </label>
              <label class="wide">
                初始检查
                <input id="initial-check" type="text" />
              </label>
              <label class="wide">
                备注
                <textarea id="flow-description" rows="3"></textarea>
              </label>
            </div>
            <div class="workflow-actions">
              <button id="validate-workflow" type="button">校验定义</button>
              <button id="export-workflow" type="button">导出 JSON</button>
              <button id="import-workflow" type="button">载入 JSON</button>
            </div>
            <textarea id="workflow-json" spellcheck="false"></textarea>
          </section>

          <section class="step-panel panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Steps</p>
                <h2>步骤编排</h2>
              </div>
              <span id="step-count" class="count">0</span>
            </div>
            <div class="step-toolbar">
              <select id="new-step-type">
                <option value="detect_page">detect_page</option>
                <option value="image_click">image_click</option>
                <option value="mouse_move">mouse_move</option>
                <option value="hotkey">hotkey</option>
                <option value="restore">restore</option>
              </select>
              <button id="add-step" type="button">添加步骤</button>
            </div>
            <div id="step-list" class="step-list"></div>
          </section>

          <section class="inspector-panel panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Inspector</p>
                <h2>步骤属性</h2>
              </div>
            </div>
            <div id="step-editor-empty" class="empty-block">未选择步骤</div>
            <div id="step-editor" class="step-editor" hidden>
              <label>
                名称
                <input id="step-name" type="text" />
              </label>
              <label>
                类型
                <select id="step-type">
                  <option value="detect_page">detect_page</option>
                  <option value="image_click">image_click</option>
                  <option value="mouse_move">mouse_move</option>
                  <option value="hotkey">hotkey</option>
                  <option value="restore">restore</option>
                </select>
              </label>
              <label>
                目标
                <input id="step-target" type="text" />
              </label>
              <div class="inline-fields">
                <label>
                  超时 ms
                  <input id="step-timeout" type="number" min="0" step="100" />
                </label>
                <label>
                  重试
                  <input id="step-retry" type="number" min="0" max="20" />
                </label>
              </div>
              <label>
                失败处理
                <select id="step-on-fail">
                  <option value="stop">stop</option>
                  <option value="retry">retry</option>
                  <option value="skip">skip</option>
                  <option value="restore">restore</option>
                </select>
              </label>
              <div class="step-actions">
                <button id="move-step-up" type="button">上移</button>
                <button id="move-step-down" type="button">下移</button>
                <button id="delete-step" type="button" class="danger">删除</button>
              </div>
            </div>
          </section>

          <section class="run-panel panel">
            <div class="panel-title">
              <div>
                <p class="eyebrow">Runbook</p>
                <h2>运行记录</h2>
              </div>
              <span id="run-state" class="state-pill">idle</span>
            </div>
            <div id="run-summary" class="run-summary">等待定义</div>
            <div id="run-log" class="run-log"></div>
          </section>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
